services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mediadetox-api:local
    container_name: mediadetox-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mediadetox:mediadetox@postgres:5432/mediadetox?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: mediadetox-postgres
    environment:
      POSTGRES_DB: mediadetox
      POSTGRES_USER: mediadetox
      POSTGRES_PASSWORD: mediadetox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediadetox -d mediadetox"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: mediadetox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
